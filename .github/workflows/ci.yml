name: CI/CD MLflow

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas==2.3.3 scikit-learn==1.8.0 numpy==2.3.3

    - name: Train Machine Learning Model
      run: |
        mlflow run MLProject --env-manager local

    - name: Upload MLflow Runs Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifacts
        path: |
          mlruns/
          MLProject/mlruns/

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Model Docker Image
      run: |
        # Cari folder model hasil training yang baru dibuat secara dinamis
        MODEL_PATH=$(find mlruns/ -type d -name "model" | head -n 1)
        echo "Model ditemukan di: $MODEL_PATH"
        
        # Bangun docker image menggunakan MLflow CLI
        mlflow models build-docker -m "$MODEL_PATH" -n "${{ secrets.DOCKERHUB_USERNAME }}/diabetes-model:latest"

    - name: Push Docker Image to Docker Hub
      run: |
        docker push "${{ secrets.DOCKERHUB_USERNAME }}/diabetes-model:latest"

    - name: Commit and Push MLflow Runs to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add mlruns/
        git commit -m "chore: save training artifacts from CI workflow [skip ci]" || echo "No changes to commit"
        git push
